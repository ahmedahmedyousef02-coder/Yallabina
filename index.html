<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Yall Bina - ياللا بينا | AI Zoon</title>
    <!-- Font Awesome 6 for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'GESSTwo', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            direction: rtl;
            transition: background-color 1s ease;
            background-color: #1f4d3e; /* Fallback */
        }

        /* إضافة نسيج ناعم جداً للخلفية بدون أي شعاع */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, rgba(255,255,240,0.02) 0px, rgba(255,255,240,0.02) 20px, rgba(210,180,140,0.01) 20px, rgba(210,180,140,0.01) 40px);
            pointer-events: none;
            z-index: 0;
        }

        /* البطاقة الرئيسية - الألوان ستتغير عبر JS */
        .mustard-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 750px;
            background: #d4a81e; /* Default */
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
            padding: 2rem 1.8rem; /* تصغير عام للباديング */
            border: 2px solid #b48b1a;
            transition: background-color 1s ease, border-color 1s ease, transform 0.2s ease;
        }

        .mustard-card:hover {
            transform: scale(1.01);
        }

        /* حاوية المفتاحين (رابطين) */
        .keys-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        /* تصميم موحد للمفاتيح */
        .app-key-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2b5e4c;
            padding: 0.8rem 1.4rem 0.8rem 1.8rem;
            border-radius: 50px 12px 50px 12px;
            border: 2px solid #f5e56b;
            box-shadow: 0 6px 0 #1a3a2f;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            transition: 0.15s ease;
            direction: ltr;
        }

        .app-key-link i {
            font-size: 1.5rem;
            color: #f5d742;
        }

        .app-key-link span {
            color: #ffffff;
            font-weight: 800;
        }

        .app-key-link:hover {
            background: #236b54;
            border-color: #ffea7a;
            box-shadow: 0 4px 0 #1a3a2f;
            transform: translateY(-2px);
        }

        .app-key-link:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a3a2f;
        }

        /* العنوان الرئيسي بحجم 50% من السابق */
        .main-headline {
            font-size: 1.8rem; /* 3rem -> 1.8rem (40% تخفيض) */
            font-weight: 900;
            text-align: center;
            margin: 1.2rem 0 0.8rem;
            line-height: 1.3;
            color: #2b4a3a;
            background: transparent;
            text-shadow: none;
            letter-spacing: 0.5px;
        }

        /* عبارة "يا أبو حميد" بحجم 50% من السابق */
        .abu-hamid {
            font-size: 1.4rem; /* 2.4rem -> 1.4rem (42% تخفيض) */
            font-weight: 700;
            text-align: center;
            margin: 1.2rem 0 1.5rem;
            color: #2b4a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .abu-hamid i {
            color: #2b4a3a;
            font-size: 1.3rem;
            opacity: 0.9;
        }

        /* حاوية البوصلة */
        .compass-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1rem auto 1.5rem;
            width: 100%;
        }

        /* بوصلة مرسومة 3D - تصغير طفيف */
        .compass-3d {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        /* الدائرة الأساسية */
        .compass-circle {
            position: absolute;
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffd966, #ffb347, #ff8c42, #ff6b6b, #a06ab4, #4a90e2);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3), 0 0 0 3px #f0e68c, 0 0 0 6px #c9b037;
            transform: rotateX(10deg) rotateY(10deg);
            transition: transform 0.3s ease;
        }

        /* الاتجاهات الأربعة */
        .direction {
            position: absolute;
            font-weight: 900;
            font-size: 1.1rem;
            text-shadow: 1px 1px 0 #333, 2px 2px 0 rgba(0,0,0,0.2);
            z-index: 15;
        }

        .north { top: 8px; color: #e63946; transform: translateZ(8px); }
        .south { bottom: 8px; color: #2a9d8f; transform: translateZ(8px); }
        .east { right: 12px; color: #e9c46a; transform: translateZ(8px); }
        .west { left: 12px; color: #3b8ea5; transform: translateZ(8px); }

        /* الإبرة 3D */
        .needle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #c92a2a;
            transform: rotate(45deg) translateZ(12px);
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5));
            z-index: 20;
        }
        
        .needle::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -8px;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ffd966, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 8px #ffd966;
        }

        .needle-south {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 32px solid #4a4e69;
            transform: rotate(225deg) translateZ(6px);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
            z-index: 18;
            opacity: 0.9;
        }

        .compass-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle, #fff5b0, #f1c40f);
            border-radius: 50%;
            z-index: 25;
            box-shadow: 0 0 8px #ffd966;
            transform: translateZ(16px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-6px) rotate(2deg); }
            75% { transform: translateY(6px) rotate(-2deg); }
        }

        .compass-3d:hover {
            animation: none;
            transform: scale(1.1) rotateX(5deg) rotateY(5deg);
            transition: transform 0.4s ease;
        }

        /* تذييل بسيط */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #2d4f40;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .footer-note i {
            color: #2d4f40;
            margin: 0 4px;
        }

        /* زخارف */
        .static-icon {
            position: absolute;
            font-size: 2.8rem;
            opacity: 0.1;
            color: #2d4f40;
            z-index: 1;
            user-select: none;
        }

        .icon-left { top: 3%; left: 2%; }
        .icon-right { bottom: 3%; right: 2%; }

        /* تحسينات للأجهزة الصغيرة */
        @media (max-width: 480px) {
            .mustard-card { padding: 1.5rem 1rem; }
            .main-headline { font-size: 1.5rem; }
            .abu-hamid { font-size: 1.2rem; gap: 8px; }
            .abu-hamid i { font-size: 1rem; }
            .app-key-link { font-size: 0.9rem; padding: 0.6rem 1rem; }
            .app-key-link i { font-size: 1.2rem; }
            .compass-3d { width: 90px; height: 90px; }
            .compass-circle { width: 80px; height: 80px; }
            .direction { font-size: 0.9rem; }
            .needle { border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #c92a2a; }
        }

        /* شاشات متوسطة */
        @media (min-width: 481px) and (max-width: 768px) {
            .main-headline { font-size: 1.7rem; }
            .abu-hamid { font-size: 1.3rem; }
        }
    </style>
</head>
<body id="mainBody">

    <!-- زخارف -->
    <i class="fas fa-key static-icon icon-left"></i>
    <i class="fas fa-leaf static-icon icon-right"></i>

    <div class="mustard-card" id="mainCard">
        <!-- مفتاحين: الرابط نفسه يعمل في كليهما -->
        <div class="keys-container">
            <a href="https://ai.studio/apps/7a5c56e3-e4b9-423f-a527-1ee89d29ea02?fullscreenApplet=true" 
               class="app-key-link" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="fas fa-key"></i>
                <span>Yall Bina</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="https://ai.studio/apps/7a5c56e3-e4b9-423f-a527-1ee89d29ea02?fullscreenApplet=true" 
               class="app-key-link" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="fas fa-key"></i>
                <span>ياللا بينا</span>
                <i class="fas fa-external-link-alt"></i>
            </a>
        </div>

        <!-- النص الرئيسي بحجم مصغر -->
        <div class="main-headline">
            أهلا بك فى <br> AI Zoon
        </div>

        <!-- عبارة يا أبو حميد بحجم مصغر -->
        <div class="abu-hamid">
            <i class="fas fa-star"></i> يا أبو حميد <i class="fas fa-star"></i>
        </div>

        <!-- لوجو البوصلة 3D -->
        <div class="compass-container">
            <div class="compass-3d" id="compass">
                <div class="compass-circle"></div>
                <div class="direction north">N</div>
                <div class="direction south">S</div>
                <div class="direction east">E</div>
                <div class="direction west">W</div>
                <div class="needle"></div>
                <div class="needle-south"></div>
                <div class="compass-dot"></div>
            </div>
        </div>

        <div class="footer-note">
            <i class="fas fa-square"></i> AI ZOON · بوستاجيو <i class="fas fa-square"></i>
        </div>
    </div>

    <script>
        // مجموعة الألوان - 12 مجموعة (خلفية الجسم، لون البطاقة، لون الحدود)
        const colorSchemes = [
            { // 1
                bodyBg: '#1f4d3e',
                cardBg: '#d4a81e',
                border: '#b48b1a'
            },
            { // 2
                bodyBg: '#2c3e50',
                cardBg: '#e67e22',
                border: '#b85e0e'
            },
            { // 3
                bodyBg: '#4a235a',
                cardBg: '#f4d03f',
                border: '#b7950b'
            },
            { // 4
                bodyBg: '#1e2b3a',
                cardBg: '#48c9b0',
                border: '#1e8f7a'
            },
            { // 5
                bodyBg: '#6d4c41',
                cardBg: '#f1948a',
                border: '#b03a2e'
            },
            { // 6
                bodyBg: '#1b4d3e',
                cardBg: '#bb8fce',
                border: '#884ea0'
            },
            { // 7
                bodyBg: '#515a5a',
                cardBg: '#f7dc6f',
                border: '#b7950b'
            },
            { // 8
                bodyBg: '#154360',
                cardBg: '#ec7063',
                border: '#b03a2e'
            },
            { // 9
                bodyBg: '#0e4d3a',
                cardBg: '#5dade2',
                border: '#1f618d'
            },
            { // 10
                bodyBg: '#4d3b1a',
                cardBg: '#e59866',
                border: '#a45d2b'
            },
            { // 11
                bodyBg: '#1a3b4d',
                cardBg: '#a569bd',
                border: '#6c3483'
            },
            { // 12
                bodyBg: '#3c1a1a',
                cardBg: '#7dcea0',
                border: '#1e6b3b'
            }
        ];

        let currentIndex = 0;
        const body = document.getElementById('mainBody');
        const card = document.getElementById('mainCard');

        // تطبيق مجموعة الألوان
        function applyColorScheme(index) {
            const scheme = colorSchemes[index];
            body.style.backgroundColor = scheme.bodyBg;
            card.style.backgroundColor = scheme.cardBg;
            card.style.borderColor = scheme.border;
        }

        // تغيير الألوان كل 30 ثانية
        setInterval(() => {
            currentIndex = (currentIndex + 1) % colorSchemes.length;
            applyColorScheme(currentIndex);
        }, 30000); // 30 ثانية

        // تأثير بسيط للبوصلة عند النقر
        document.getElementById('compass').addEventListener('click', function() {
            this.style.transform = 'rotate(180deg) scale(1.1)';
            setTimeout(() => {
                this.style.transform = '';
            }, 400);
        });

        // تطبيق أول مجموعة ألوان عند التحميل
        applyColorScheme(0);

        // تأكيد تحميل الصفحة متجاوبة
        console.log('صفحة متجاوبة مع جميع الأجهزة');
    </script>
</body>
</html>
